name: Generate Daily Puzzle

on:
  schedule:
    # GitHub Actions cron uses UTC. This runs at 22:00 UTC daily, which is
    # midnight in Israel during standard time and 01:00 during daylight saving time.
    - cron: "0 22 * * *"
  workflow_dispatch:

concurrency:
  group: daily-puzzle
  cancel-in-progress: false

jobs:
  generate-puzzle:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate puzzle
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: python generate_puzzle.py
